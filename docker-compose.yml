version: '3.8'

services:
  backend:
    image: polyglot-backend
    ports:
      - "8080:8080"
    networks:
      - polyglot-net

  worker:
    image: polyglot-worker
    depends_on:
      - backend
    networks:
      - polyglot-net

  frontend:
    image: polyglot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - polyglot-net

networks:
  polyglot-net:
    driver: bridge