version: '3.8'

services:
  backend:
    image: polyglot-backend
    ports:
      - "8080:8080"
    networks:
      - polyglot-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker:
    image: polyglot-worker
    networks:
      - polyglot-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: polyglot-frontend
    ports:
      - "3000:80"
    networks:
      - polyglot-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  polyglot-net:
    driver: overlay